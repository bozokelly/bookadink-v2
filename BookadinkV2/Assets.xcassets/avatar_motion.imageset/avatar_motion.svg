<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="48" cy="14" r="11" fill="#111111"/>
  <!-- Body -->
  <rect x="40" y="27" width="16" height="24" rx="6" fill="#111111"/>
  <!-- Right arm extended, holding paddle -->
  <line x1="56" y1="34" x2="76" y2="24" stroke="#111111" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Paddle head at end of arm -->
  <ellipse cx="82" cy="20" rx="10" ry="12" fill="#111111"/>
  <!-- Left arm counterbalance -->
  <line x1="40" y1="34" x2="22" y2="44" stroke="#111111" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left leg back -->
  <line x1="44" y1="51" x2="32" y2="72" stroke="#111111" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Right leg forward -->
  <line x1="52" y1="51" x2="64" y2="70" stroke="#111111" stroke-width="5.5" stroke-linecap="round"/>
</svg>
